<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrologiya Test Tizimi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        /* Umumiy sahifa ko'rinishi */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* Oq rangli bloklar (kartalar) uchun */
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* Kirish joylari va tugmalar */
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            display: block;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            border: none;
            transition: 0.3s;
            font-weight: bold;
        }

        /* Test variantlari tugmalari (JavaScript orqali qo'shiladi) */
        .test-option-btn {
            background-color: #f8f9fa;
            text-align: left;
            border: 1px solid #eee;
            margin-bottom: 8px;
        }

        .test-option-btn:hover {
            background-color: #e9ecef;
            border-color: #007bff;
        }

        /* Natijalar jadvali */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th { background-color: #f8f9fa; }

        /* Yashirin bloklar */
        .hidden { display: none; }

        /* Taymer stili */
        #timer {
            font-size: 20px;
            color: #e74c3c;
            font-weight: bold;
            text-align: right;
            margin-bottom: 15px;
        }

        @media print { body { display: none !important; } }
    </style>
</head>
<body>

    <div class="card">
        <div id="login-form">
            <h2 style="text-align: center;">Testga kirish</h2>
            <input type="text" id="userName" placeholder="Ism Familiyangiz">
            <select id="userGroup">
                <option value="">-- Guruhingizni tanlang --</option>
                <option value="961-23">961-23</option>
                <option value="942-23">942-23</option>
                <option value="941-23">941-23</option>
            </select>
            <button onclick="startTest()" style="background-color: #007bff; color: white;">Testni boshlash</button>
        </div>

        <div id="test-section" class="hidden">
            <div id="timer">Vaqt: 40:00</div>
            <h3 id="question-text">Savollar yuklanmoqda...</h3>
            <div id="options-container"></div>
            <button id="next-btn" onclick="nextQuestion()" class="hidden" style="background-color: #2ecc71; color: white;">Keyingi savol</button>
        </div>

        <div id="admin-panel" class="hidden">
    <hr>
    <h3 style="margin-top: 20px;">Admin: Savol qo'shish</h3>
    <input type="text" id="newQ" placeholder="Savol matni" style="width: 100%; margin-bottom: 10px; padding: 10px;">
    <input type="text" id="correctA" placeholder="To'g'ri javob" style="width: 100%; margin-bottom: 10px; padding: 10px;">
    <input type="text" id="wrong1" placeholder="Xato javob 1" style="width: 100%; margin-bottom: 10px; padding: 10px;">
    <input type="text" id="wrong2" placeholder="Xato javob 2" style="width: 100%; margin-bottom: 10px; padding: 10px;">
    <input type="text" id="wrong3" placeholder="Xato javob 3" style="width: 100%; margin-bottom: 10px; padding: 10px;">
    <button onclick="addQuestion()" style="background-color: #28a745; color: white; width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 5px;">Bazaga qo'shish</button>
    
    <div id="admin-results" style="margin-top: 40px;">
        <h3 style="text-align: center; color: #2c3e50;">Talabalar natijalari jadvali</h3>
        <div id="results-table-container"></div>
    </div>
</div>
    </div>

    <script src="script.js"></script>

</body>
</html>
