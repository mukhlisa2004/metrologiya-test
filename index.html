<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrologiya Test Tizimi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
    /* Umumiy sahifa ko'rinishi */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        display: flex;
        flex-direction: column; /* Elementlarni vertikal (ustun shaklida) qilish */
        align-items: center;    /* O'rtaga tekislash */
        padding: 20px;
        margin: 0;
    }

    /* Oq rangli bloklar (kartalar) uchun */
    .card, #admin-panel, #admin-results {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 550px; /* Bloklar kengligi bir xil bo'ladi */
        margin-bottom: 25px; /* Har bir blok orasida masofa */
        box-sizing: border-box;
    }

    /* Kirish joylari va tugmalar */
    input, select, button {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        display: block;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 16px;
        box-sizing: border-box;
    }

    button {
        cursor: pointer;
        border: none;
        transition: 0.3s;
    }

    /* Test variantlari tugmalari uchun maxsus */
    .option-btn {
        background-color: #f8f9fa;
        text-align: left;
    }

    .option-btn:hover {
        background-color: #e9ecef;
    }

    /* Natijalar jadvali stili */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        background-color: white;
    }

    th, td {
        border: 1px solid #dee2e6;
        padding: 12px;
        text-align: left;
    }

    th {
        background-color: #f8f9fa;
    }

    /* Yashirin bloklar uchun */
    .hidden {
        display: none;
    }
</style>
</head>
<body>

<div class="card">
    <div id="login-form">
        <h2 style="text-align: center;">Testga kirish</h2>
        
        <input type="text" id="userName" placeholder="Ism Familiyangiz">
        
        <select id="userGroup" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px;">
            <option value="">-- Guruhingizni tanlang --</option>
            <option value="961-23">961-23</option>
            <option value="942-23">942-23</option>
            <option value="941-23">941-23</option>
        </select>
        
        <button onclick="startTest()" style="background-color: #007bff; color: white; font-weight: bold;">Testni boshlash</button>
    </div>

    <div id="test-section" class="hidden">
        <div id="timer" style="color: red; font-weight: bold; text-align: right;">Vaqt: 40:00</div>
        <h3 id="question-text">Savollar yuklanmoqda...</h3>
        <div id="options-container"></div>
        <button id="next-btn" onclick="nextQuestion()" class="hidden" style="margin-top: 15px;">Keyingi savol</button>
    </div>
</div>

    <div id="admin-panel" class="admin-section hidden">
        <h3>Admin: Savol qo'shish</h3>
        <input type="text" id="newQ" placeholder="Savol matni">
        <input type="text" id="correctA" placeholder="To'g'ri javob">
        <input type="text" id="wrong1" placeholder="Xato javob 1">
        <input type="text" id="wrong2" placeholder="Xato javob 2">
        <input type="text" id="wrong3" placeholder="Xato javob 3">
        <button onclick="addQuestion()" style="background-color: #28a745;">Bazaga qo'shish</button>
    </div>
    <div id="admin-results" class="hidden" style="margin-top: 20px;">
    <h3 style="text-align: center;">Talabalar natijalari</h3>
    <div id="results-table-container"></div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
